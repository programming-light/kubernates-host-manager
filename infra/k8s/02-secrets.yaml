apiVersion: v1
kind: Secret
metadata:
  name: k8s-platform-secrets
  namespace: k8s-platform
type: Opaque
stringData:
  # Database
  DATABASE_URL: postgresql://user:password@postgres.default.svc.cluster.local:5432/k8s_platform
  
  # Redis
  REDIS_URL: redis://redis.default.svc.cluster.local:6379
  
  # JWT Secrets - CHANGE THESE IN PRODUCTION
  JWT_SECRET: change-me-in-production-32-character-string
  JWT_REFRESH_SECRET: change-me-in-production-32-char-string
  JWT_EXPIRATION: 15m
  JWT_REFRESH_EXPIRATION: 7d
  
  # Encryption Key - CHANGE THIS IN PRODUCTION (32 hex characters)
  ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef
  
  # Stripe (optional)
  STRIPE_SECRET_KEY: sk_live_your_key_here
  STRIPE_PUBLISHABLE_KEY: pk_live_your_key_here
  STRIPE_WEBHOOK_SECRET: whsec_your_key_here
  
  # Email (optional)
  SMTP_HOST: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_USER: noreply@k8s-platform.io
  SMTP_PASS: your-app-password
  SENDER_EMAIL: noreply@k8s-platform.io
  
  # Sentry (optional)
  SENTRY_DSN: https://your-sentry-dsn@sentry.io/project-id
