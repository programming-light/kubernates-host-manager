apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
- ../../base

namespace: k8s-platform

commonLabels:
  environment: production

commonAnnotations:
  environment: production

replicas:
- name: backend
  count: 3
- name: frontend
  count: 3
- name: worker
  count: 3

images:
- name: k8s-platform/backend
  newTag: latest
- name: k8s-platform/frontend
  newTag: latest
- name: k8s-platform/worker
  newTag: latest

patches:
- target:
    group: apps
    version: v1
    kind: Deployment
    name: backend
  patch: |-
    - op: add
      path: /spec/template/spec/affinity
      value:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - backend
            topologyKey: kubernetes.io/hostname

- target:
    group: autoscaling
    version: v2
    kind: HorizontalPodAutoscaler
    name: backend-hpa
  patch: |-
    - op: replace
      path: /spec/maxReplicas
      value: 20

secretGenerator:
- name: database-credentials
  behavior: merge
  literals:
  - url=${DATABASE_URL}
- name: auth-secrets
  behavior: merge
  literals:
  - jwt-secret=${JWT_SECRET}

configMapGenerator:
- name: production-config
  behavior: create
  literals:
  - environment=production
  - log-level=info
  - enable-metrics=true
