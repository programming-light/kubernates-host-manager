apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

bases:
- ../../base

namespace: k8s-platform-staging

commonLabels:
  environment: staging

commonAnnotations:
  environment: staging

replicas:
- name: backend
  count: 1
- name: frontend
  count: 1
- name: worker
  count: 1

images:
- name: k8s-platform/backend
  newTag: staging
- name: k8s-platform/frontend
  newTag: staging
- name: k8s-platform/worker
  newTag: staging

patches:
- target:
    group: apps
    version: v1
    kind: Deployment
  patch: |-
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/memory
      value: 256Mi
    - op: replace
      path: /spec/template/spec/containers/0/resources/limits/cpu
      value: 250m

secretGenerator:
- name: database-credentials
  behavior: merge
  literals:
  - url=${STAGING_DATABASE_URL}
- name: auth-secrets
  behavior: merge
  literals:
  - jwt-secret=${STAGING_JWT_SECRET}

configMapGenerator:
- name: staging-config
  behavior: create
  literals:
  - environment=staging
  - log-level=debug
  - enable-metrics=true
