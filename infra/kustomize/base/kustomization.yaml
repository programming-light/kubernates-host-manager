apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: k8s-platform

resources:
- ../../k8s/00-namespace.yaml
- ../../k8s/01-configmap.yaml
- ../../k8s/02-secrets.yaml
- ../../k8s/03-backend.yaml
- ../../k8s/04-frontend.yaml
- ../../k8s/05-worker.yaml
- ../../k8s/06-ingress.yaml
- ../../k8s/07-database-migration.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: k8s-platform

commonAnnotations:
  documentation: "https://github.com/your-org/k8s-platform"

replicas:
- name: backend
  count: 2
- name: frontend
  count: 2
- name: worker
  count: 2

images:
- name: k8s-platform/backend
  newTag: latest
- name: k8s-platform/frontend
  newTag: latest
- name: k8s-platform/worker
  newTag: latest
